<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 20 - Desafio</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #circulo {
            width: 200px;
            height: 200px;
            background-color: blue;
            border-radius: 50%;
            margin-bottom: 20px;
            display: block;
        }

        #botao {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="circulo"></div>
    <button id="botao">Esconder</button>

    <script>
        let circulo = document.getElementById("circulo");
        let botao = document.getElementById("botao");

        function esconderCirculo() {
            circulo.style.display = "none";
        }

        botao.onclick = esconderCirculo;
    </script>

</body>

</html>
