<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .quadrado {
            width: 100px;
            height: 100px;
            background-color: gray;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="quadrado"></div>
    <div class="quadrado"></div>
    <div class="quadrado"></div>

    <script>
        let quadrado = document.getElementsByClassName("quadrado");
        
        quadrado[0].style.backgroundColor = "blue";
        quadrado[1].style.backgroundColor = "orange";
        quadrado[2].style.backgroundColor = "pink";
    </script>

</body>

</html>
