<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #quadrado {
            width: 100px;
            height: 100px;
            background-color: gray;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <div id="quadrado"></div>
    <button id="botaoMudar">Mudar para Azul</button>

    <script>
        let quadrado = document.querySelector("#quadrado");
        let botao = document.querySelector("#botaoMudar");

        function transformarEmAzul() {
            quadrado.style.backgroundColor = "blue";
        }

        botao.onclick = transformarEmAzul;
    </script>

</body>

</html>
