<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Desafio Mensagem</title>
    <style>
        .verde {
            width: 300px;
            height: 100px;
            background-color: green;
            color: white;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="caixa" class="verde"></div>
    <button id="botao">Mostrar Mensagem</button>

    <script>
        let caixa = document.getElementById("caixa");
        let botao = document.getElementById("botao");

        function mostrarMensagem() {
            caixa.innerText = "Cor alterada com sucesso!";
        }

        botao.onclick = mostrarMensagem;
    </script>

</body>
</html>
