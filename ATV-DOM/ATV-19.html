<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        #titulo {
            color: black;
            text-align: center;
            font-size: 120px;
            margin: 0 0 20px 0;
            transition: all 1s ease;
        }

        #botao {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1 id="titulo">TÍTULO</h1>
    <button id="botao">COLORIR</button>

    <script>
        let botao = document.querySelector("#botao");
        let titulo = document.getElementById("titulo");

        function colorirTitulo() {
            titulo.style.backgroundColor = "aquamarine";
            titulo.style.color = "white";
        }

        botao.onclick = colorirTitulo;
    </script>

</body>

</html>
