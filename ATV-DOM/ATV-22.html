<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .bloco {
            width: 250px;
            height: 250px;
            background-color: gray;
            margin-bottom: 10px;
            transition: background-color 1s ease;
            margin: 20px;
        }

        .bloco:nth-of-type(1) {
            transition-delay: 1s;
        }

        .bloco:nth-of-type(2) {
            transition-delay: 2s;
        }

        .bloco:nth-of-type(3) {
            transition-delay: 3s;
        }

        .bloco:nth-of-type(4) {
            transition-delay: 4s;
        }

        .bloco:nth-of-type(5) {
            transition-delay: 5s;
        }

        #botao {
            margin-top: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="bloco"></div>
    <div class="bloco"></div>
    <div class="bloco"></div>
    <div class="bloco"></div>
    <div class="bloco"></div>

    <button id="botao">COLORIR</button>

    <script>
        let blocos = document.getElementsByClassName('bloco');
        let botao = document.querySelector("#botao");

        function colorirQuadra() {

            blocos[0].style.backgroundColor = "red";
            blocos[1].style.backgroundColor = "orange";
            blocos[2].style.backgroundColor = "yellow";
            blocos[3].style.backgroundColor = "green";
            blocos[4].style.backgroundColor = "blue";
        }

        botao.onclick = colorirQuadra;
    </script>
</body>

</html>
